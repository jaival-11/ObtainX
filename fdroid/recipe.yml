# Fill with the SHA-256 of your release signing cert (lowercase hex, no colons) —
# see the [TODO] in the header. F-Droid uses it to confirm the mirrored APK is
# signed by you before publishing.
AllowedAPKSigningKeys: 64:37:E8:BE:94:51:BD:7D:02:21:55:11:D3:E5:04:A8:8C:50:BE:72:B6:DD:05:AC:4B:5B:87:F5:A2:05:B6:87

# Auto-update: the bot watches tags (UpdateCheckMode: Tags), reads the base
# versionCode from pubspec.yaml (e.g. 3800), then generates one build per
# VercodeOperation — 10*%c+1/+2/+3 → 38001/38002/38003 — cloning the three blocks
# above (in order) with the new versionName/versionCode. Matches build.gradle.kts.
AutoUpdateMode: Version
UpdateCheckMode: Tags
VercodeOperation:
  - 10*%c+1
  - 10*%c+2
  - 10*%c+3
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 2.8.0
CurrentVersionCode: 38003
