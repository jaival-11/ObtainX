name: Build APKs

on:
  # push:
  #  branches: [main]
  #  tags: ['v*']
  # pull_request:
  #  branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          # Pinned for F-Droid reproducibility: F-Droid rebuilds the fdroid-flavor
          # APK and diffs it byte-for-byte against the signed release asset, so the
          # toolchain must be fixed (a floating `channel: stable` would break it).
          # Keep this EQUAL to the .flutter submodule commit referenced by the
          # fdroiddata recipe; bump both together when upgrading Flutter.
          flutter-version: 3.44.2
          cache: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get Dependencies
        run: flutter pub get

      - name: Set up signing
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/bikram_signer.p12
          cat > android/key.properties <<PROPS
          storePassword=$KS_PASS
          keyPassword=$KS_PASS
          keyAlias=$K_ALIAS
          storeFile=bikram_signer.p12
          PROPS
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          K_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Extract Version
        id: extract_version
        run: |
          VERSION=$(grep -oP "^version: [^\+]+" pubspec.yaml | tail -c +10)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APKs
        run: |
          set -e
          APK_DIR=build/app/outputs/flutter-apk
          VERSION=${{ steps.extract_version.outputs.version }}

          # Normal flavor — public GitHub download (in-app self-update enabled).
          flutter build apk --split-per-abi --flavor normal
          for f in "$APK_DIR"/app-*-normal-release.apk; do
            arch=$(basename "$f" | sed -E 's/^app-(.+)-normal-release\.apk$/\1/')
            mv "$f" "$APK_DIR/ObtainX-v${VERSION}-${arch}.apk"
          done

          # F-Droid flavor — self-update disabled via lib/main_fdroid.dart
          # Split per-ABI (~24 MB each) so F-Droid downloads stay small. 
          # The fdroiddata recipe has one entry per ABI (VercodeOperation
          # list), so auto-update still works, and each entry's binary: points at the
          # matching file produced here.
          flutter build apk --split-per-abi --flavor fdroid -t lib/main_fdroid.dart
          for f in "$APK_DIR"/app-*-fdroid-release.apk; do
            arch=$(basename "$f" | sed -E 's/^app-(.+)-fdroid-release\.apk$/\1/')
            mv "$f" "$APK_DIR/ObtainX-v${VERSION}-fdroid-${arch}.apk"
          done

          rm -f "$APK_DIR"/*.sha1
          ls -l "$APK_DIR"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: obtainx-apks-v${{ steps.extract_version.outputs.version }}
          path: build/app/outputs/flutter-apk/ObtainX-*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          tag_name: ${{ github.ref == 'refs/heads/main' && format('v{0}', steps.extract_version.outputs.version) || github.ref_name }}
          files: build/app/outputs/flutter-apk/ObtainX-*.apk
          generate_release_notes: true

      - name: Generate Generic Attestations
        uses: actions/attest@v4.1.0
        with:
          subject-path: 'build/app/outputs/flutter-apk/ObtainX-*.apk'
